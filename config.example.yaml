# Dataset Configuration File
# Copy this to a new config file under datasets-workspace/configs/.

# Basic information
dataset_id: "unique-dataset-id"
dataset_name: "Your Dataset Name"
description: "Short package description"
year: 2026

# Task type: object_detection | segmentation | classification
task_type: "segmentation"

# Optional when task_type=segmentation:
# semantic_segmentation | instance_segmentation | panoptic_segmentation
segmentation_type: "semantic_segmentation"

# Format:
# - coco
# - yolo
# - voc
# - image_folder
# - png_masks
format: "png_masks"

# IMPORTANT: define either 'splits' or 'data' (not both).

# Option A: Multi-split
# splits:
#   train:
#     annotations: "annotations/train.json"
#     images_root: "images/train"
#   val:
#     annotations: "annotations/val.json"
#     images_root: "images/val"
#   test:
#     annotations: "annotations/test.json"
#     images_root: "images/test"

# Option B: Single split (recommended for most package onboarding)
data:
  images_root: "D:/path/to/images"
  masks_root: "D:/path/to/masks"

  # For png_masks, list mask filename suffixes checked in order.
  # Example: image abc.jpg can match abc_MASK.png with suffix _MASK,
  # or abc.png with empty suffix.
  mask_suffixes: [""]

  # For semantic segmentation, define integer-to-class mapping.
  # Background is usually omitted from class_map and optionally excluded.
  class_map:
    "1": "crack"
    "2": "pothole"

  # Optional labels to exclude from foreground stats/components.
  # Supports either raw ids ("0") or mapped names ("background").
  class_exclude: ["0"]

  # Optional for segmentation with very large masks.
  # false = class-presence counting only (faster), true = connected components.
  connected_components: false

# Optional helpers for classification country stats.
# If omitted, heuristics based on class names are used.
# positive_classes: ["crack", "pothole"]

# Optional taxonomy override map for code-like labels (for example RDD classes D00, D10, D40).
# If not provided, enrichment will try taxonomy registry aliases first.
# For code labels, description-based inference is attempted before falling back to code_legacy.
# Mapped values populate class_taxonomy; annotation_schema classes keep canonical_name as reference only.
# label_codebook:
#   D00:
#     canonical_name: "crack.longitudinal"
#     damage_family: "crack"
#     role: "damage_target"
#   D40:
#     canonical_name: "pothole"
#     damage_family: "pothole"
#     role: "damage_target"

# Geographic and temporal metadata
countries:
  - name: "Country Name"
    image_count: 0
temporal_scope: "Not specified"

# Authors
authors:
  - name: "Author Name"
    affiliation: "Organization"
    role: "Dataset Creator"

# License string shown in METADATA.json
license: "Specify license"

# Public links
links:
  github: "https://github.com/large-road-damage-datalake/unique-dataset-id"
  download: "https://example.com/dataset-download"

# Citation metadata used to seed METADATA.json
citations:
  bibtex: |
    @dataset{unique_dataset_id,
      title={Your Dataset Name},
      author={Author Name},
      year={2026},
      publisher={Publisher},
      url={https://github.com/large-road-damage-datalake/unique-dataset-id}
    }
